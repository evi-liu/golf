<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Golf">
<link rel="manifest" href="manifest.json">
<title>Evi vs Josh — Golf Tracker</title>
<script>
// Generate emoji app icon dynamically
(function() {
  const canvas = document.createElement('canvas');
  canvas.width = 180;
  canvas.height = 180;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#2d8a4e';
  ctx.beginPath();
  ctx.roundRect(0, 0, 180, 180, 36);
  ctx.fill();
  ctx.font = '120px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⛳', 90, 98);
  const link = document.createElement('link');
  link.rel = 'apple-touch-icon';
  link.href = canvas.toDataURL('image/png');
  document.head.appendChild(link);
})();
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f8faf8;
  --surface: #ffffff;
  --surface-alt: #f0f5f0;
  --text: #1a2e1a;
  --text-secondary: #4a6b4a;
  --text-muted: #7a9a7a;
  --border: #d4e5d4;
  --green: #2d8a4e;
  --green-light: #e6f4ec;
  --green-dark: #1a5c33;
  --accent: #d4a017;
  --accent-light: #fdf6e3;
  --red: #c0392b;
  --red-light: #fdecea;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
  --radius: 16px;
  --radius-sm: 10px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px 16px 100px;
}

.container {
  max-width: 520px;
  margin: 0 auto;
}

header {
  text-align: center;
  margin-bottom: 32px;
}

header h1 {
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--green-dark);
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}

header p {
  color: var(--text-muted);
  font-size: 0.9rem;
}

/* Scoreboard */
.scoreboard {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 28px 24px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}

.scoreboard::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--green), var(--accent));
}

.score-grid {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 16px;
}

.player {
  text-align: center;
}

.player-name {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}

.player-wins {
  font-size: 3rem;
  font-weight: 800;
  line-height: 1;
  color: var(--green);
}

.player-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 4px;
}

.vs-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.vs {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-muted);
  background: var(--surface-alt);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ties-display {
  font-size: 0.75rem;
  color: var(--text-muted);
}

.ties-display span {
  font-weight: 700;
}

.streak-badge {
  text-align: center;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  font-size: 0.85rem;
  color: var(--text-secondary);
}

.streak-badge span {
  font-weight: 600;
  color: var(--accent);
}

/* Add Game Button */
.add-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 24px;
}

.add-btn:hover { background: var(--green-dark); transform: translateY(-1px); }
.add-btn:active { transform: translateY(0); }

.add-btn svg { width: 20px; height: 20px; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 28px 20px 36px;
  width: 100%;
  max-width: 520px;
  max-height: 85vh;
  overflow-y: auto;
  overflow-x: hidden;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal h2 {
  font-size: 1.25rem;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--green-dark);
}

.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.form-group input, .form-group select {
  width: 100%;
  max-width: 100%;
  min-width: 0;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-family: var(--font);
  color: var(--text);
  background: var(--surface);
  transition: border-color 0.2s;
  -webkit-appearance: none;
  appearance: none;
}

.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--green);
  box-shadow: 0 0 0 3px var(--green-light);
}

.winner-select {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

.winner-option {
  padding: 12px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  text-align: center;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
}

.winner-option:hover { border-color: var(--green); }
.winner-option.selected {
  border-color: var(--green);
  background: var(--green-light);
  color: var(--green-dark);
}

.modal-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 24px;
}

.btn-cancel {
  padding: 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-cancel:hover { background: var(--surface-alt); }

.btn-save {
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--green);
  color: white;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-save:hover { background: var(--green-dark); }

/* Game History */
.history-section {
  margin-top: 8px;
}

.history-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.history-header h2 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
}

.history-count {
  font-size: 0.8rem;
  color: var(--text-muted);
  background: var(--surface-alt);
  padding: 4px 10px;
  border-radius: 20px;
}

.game-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.game-card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 16px;
  box-shadow: var(--shadow);
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 14px;
  position: relative;
}

.game-date {
  text-align: center;
  min-width: 44px;
}

.game-date .day {
  font-size: 1.2rem;
  font-weight: 700;
  line-height: 1.1;
  color: var(--text);
}

.game-date .month {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
}

.game-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.game-winner {
  font-weight: 600;
  font-size: 0.95rem;
}

.game-winner.evi { color: var(--green-dark); }
.game-winner.josh { color: var(--accent); }
.game-winner.tie { color: var(--text-muted); }

.game-score {
  font-size: 0.8rem;
  color: var(--text-muted);
}

.game-delete {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  padding: 6px;
  border-radius: 6px;
  opacity: 0;
  transition: all 0.2s;
}

.game-card:hover .game-delete { opacity: 1; }
.game-delete:hover { color: var(--red); background: var(--red-light); }

.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
}

.empty-state svg {
  width: 48px;
  height: 48px;
  margin-bottom: 12px;
  opacity: 0.4;
}

.empty-state p {
  font-size: 0.95rem;
}

/* Responsive */
@media (min-width: 600px) {
  body { padding: 40px 24px 100px; }
  .modal-overlay { align-items: center; }
  .modal { border-radius: var(--radius); max-height: 80vh; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>⛳ Evi vs Josh</h1>
    <p>Summer Golf Tracker</p>
  </header>

  <div class="scoreboard">
    <div class="score-grid">
      <div class="player">
        <div class="player-name">Evi</div>
        <div class="player-wins" id="evi-wins">0</div>
        <div class="player-label">wins</div>
      </div>
      <div class="vs-col">
        <div class="vs">vs</div>
        <div class="ties-display"><span id="ties-count">0</span> ties</div>
      </div>
      <div class="player">
        <div class="player-name">Josh</div>
        <div class="player-wins" id="josh-wins">0</div>
        <div class="player-label">wins</div>
      </div>
    </div>
    <div class="streak-badge" id="streak-badge" style="display:none;">
      🔥 <span id="streak-text"></span>
    </div>
  </div>

  <button class="add-btn" onclick="openModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Log a Game
  </button>

  <div class="history-section">
    <div class="history-header">
      <h2>Game History</h2>
      <span class="history-count" id="game-count">0 games</span>
    </div>
    <div class="game-list" id="game-list"></div>
  </div>
</div>

<!-- Add Game Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Log New Game</h2>
    <form id="game-form" onsubmit="saveGame(event)">
      <div class="form-group">
        <label>Date Played</label>
        <input type="date" id="game-date" required>
      </div>
      <div class="form-group">
        <label>Winner</label>
        <div class="winner-select">
          <div class="winner-option" data-winner="Evi" onclick="selectWinner(this)">Evi 🏆</div>
          <div class="winner-option" data-winner="Josh" onclick="selectWinner(this)">Josh 🏆</div>
          <div class="winner-option" data-winner="Tie" onclick="selectWinner(this)">Tie 🤝</div>
        </div>
        <input type="hidden" id="game-winner" required>
      </div>
      <div class="form-group">
        <label>Score (winner's margin)</label>
        <input type="text" id="game-score" placeholder="e.g. -1, -3, E" required>
        <small style="color:var(--text-muted);font-size:0.75rem;margin-top:4px;display:block;">How many strokes the winner won by</small>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-save">Save Game</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://dlzdstnyrckyqavmuzvh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsemRzdG55cmNreXFhdm11enZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTY2MTUsImV4cCI6MjA5MzU3MjYxNX0._oBrHqfoMJs0nEAO4ue8qeCbCUXlcdjRnRfggObCBXg';
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let games = [];

async function loadGames() {
  const { data, error } = await db
    .from('games')
    .select('*')
    .order('date', { ascending: false });
  if (error) {
    console.error('Load error:', error);
    return;
  }
  games = data || [];
  render();
}

function render() {
  const eviWins = games.filter(g => g.winner === 'Evi').length;
  const joshWins = games.filter(g => g.winner === 'Josh').length;
  const ties = games.filter(g => g.winner === 'Tie').length;

  document.getElementById('evi-wins').textContent = eviWins;
  document.getElementById('josh-wins').textContent = joshWins;
  document.getElementById('ties-count').textContent = ties;
  document.getElementById('game-count').textContent = `${games.length} game${games.length !== 1 ? 's' : ''}`;

  // Calculate streak
  const streakBadge = document.getElementById('streak-badge');
  if (games.length >= 2) {
    const sorted = [...games].sort((a, b) => new Date(b.date) - new Date(a.date));
    let streak = 1;
    const leader = sorted[0].winner;
    for (let i = 1; i < sorted.length; i++) {
      if (sorted[i].winner === leader) streak++;
      else break;
    }
    if (streak >= 2) {
      streakBadge.style.display = 'block';
      document.getElementById('streak-text').textContent = `${leader} on a ${streak}-game streak!`;
    } else {
      streakBadge.style.display = 'none';
    }
  } else {
    streakBadge.style.display = 'none';
  }

  // Render game list
  const listEl = document.getElementById('game-list');
  if (games.length === 0) {
    listEl.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 12h8M12 8v8"/>
        </svg>
        <p>No games yet. Log your first round!</p>
      </div>`;
    return;
  }

  const sorted = [...games].sort((a, b) => new Date(b.date) - new Date(a.date));
  listEl.innerHTML = sorted.map((game) => {
    const d = new Date(game.date + 'T12:00:00');
    const day = d.getDate();
    const month = d.toLocaleString('en-US', { month: 'short' });
    const winnerClass = game.winner.toLowerCase();
    const winnerText = game.winner === 'Tie' ? 'Tie' : `${game.winner} wins`;
    return `
      <div class="game-card">
        <div class="game-date">
          <div class="day">${day}</div>
          <div class="month">${month}</div>
        </div>
        <div class="game-info">
          <div class="game-winner ${winnerClass}">${winnerText}</div>
          <div class="game-score">${game.score}</div>
        </div>
        <button class="game-delete" onclick="deleteGame(${game.id})" title="Delete">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
  }).join('');
}

function openModal() {
  document.getElementById('modal-overlay').classList.add('active');
  document.getElementById('game-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('game-winner').value = '';
  document.querySelectorAll('.winner-option').forEach(el => el.classList.remove('selected'));
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modal-overlay').classList.remove('active');
  document.getElementById('game-form').reset();
}

function selectWinner(el) {
  document.querySelectorAll('.winner-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('game-winner').value = el.dataset.winner;
}

async function saveGame(e) {
  e.preventDefault();
  const winner = document.getElementById('game-winner').value;
  if (!winner) { alert('Please select a winner!'); return; }

  const game = {
    date: document.getElementById('game-date').value,
    winner: winner,
    score: document.getElementById('game-score').value.trim()
  };

  const { error } = await db.from('games').insert([game]);
  if (error) {
    alert('Error saving game: ' + error.message);
    return;
  }

  closeModal();
  await loadGames();
}

async function deleteGame(id) {
  if (!confirm('Delete this game?')) return;
  const { error } = await db.from('games').delete().eq('id', id);
  if (error) {
    alert('Error deleting game: ' + error.message);
    return;
  }
  await loadGames();
}

// Init
loadGames();

// Expose to onclick handlers
window.openModal = openModal;
window.closeModal = closeModal;
window.selectWinner = selectWinner;
window.saveGame = saveGame;
window.deleteGame = deleteGame;
</script>
</body>
</html>
